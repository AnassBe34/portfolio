<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad-in" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff" />
      <stop offset="100%" style="stop-color:#3a7bd5" />
    </linearGradient>
    <linearGradient id="grad-hid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9d50bb" />
      <stop offset="100%" style="stop-color:#6e48aa" />
    </linearGradient>
  </defs>

  <style>
    /* default link color for Dark Mode */
    .link { stroke: #21262d; stroke-width: 1; fill: none; opacity: 0.5; }
    .node { filter: url(#glow); }

    /* --- PULSE STYLE CHANGE: SET TO GRAY --- */
    .pulse { fill: #abb2bf; filter: url(#glow); opacity: 0; }
    
    @keyframes signal {
      0% { opacity: 0; offset-distance: 0%; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { opacity: 0; offset-distance: 100%; }
    }
    
    @keyframes breathing {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .p { animation: signal 2.2s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    .n { animation: breathing 3s infinite ease-in-out; transform-box: fill-box; transform-origin: center; }

    /* Media query to handle Light Mode theme */
    @media (prefers-color-scheme: light) {
      .link { stroke: #e1e4e8; }
      /* Darker gray pulse for visibility on light background */
      .pulse { fill: #5c6370; }
    }
  </style>

  <g class="links">
    <path d="M100,80 L250,60" class="link"/><path d="M100,80 L250,150" class="link"/>
    <path d="M100,150 L250,60" class="link"/><path d="M100,150 L250,150" class="link"/><path d="M100,150 L250,240" class="link"/>
    <path d="M100,220 L250,150" class="link"/><path d="M100,220 L250,240" class="link"/>
    <path d="M250,60 L400,110" class="link"/>
    <path d="M250,150 L400,110" class="link"/><path d="M250,150 L400,190" class="link"/>
    <path d="M250,240 L400,110" class="link"/><path d="M250,240 L400,190" class="link"/>
  </g>

  <circle r="2" class="pulse p" style="offset-path: path('M100,80 L250,60'); animation-delay: 0s;"/>
  <circle r="2" class="pulse p" style="offset-path: path('M100,150 L250,150'); animation-delay: 0.4s;"/>
  <circle r="2" class="pulse p" style="offset-path: path('M100,220 L250,240'); animation-delay: 0.8s;"/>

  <circle r="2" class="pulse p" style="offset-path: path('M250,60 L400,110'); animation-delay: 1.1s;"/>
  
  <circle r="2" class="pulse p" style="offset-path: path('M250,150 L400,110'); animation-delay: 1.3s;"/>
  <circle r="2" class="pulse p" style="offset-path: path('M250,150 L400,190'); animation-delay: 1.5s;"/>

  <circle r="2" class="pulse p" style="offset-path: path('M250,240 L400,190'); animation-delay: 1.7s;"/>

  <circle cx="100" cy="80" r="6" fill="url(#grad-in)" class="node n"/>
  <circle cx="100" cy="150" r="6" fill="url(#grad-in)" class="node n" style="animation-delay: 0.5s"/>
  <circle cx="100" cy="220" r="6" fill="url(#grad-in)" class="node n" style="animation-delay: 1s"/>

  <circle cx="250" cy="60" r="6" fill="url(#grad-hid)" class="node n" style="animation-delay: 0.2s"/>
  <circle cx="250" cy="150" r="6" fill="url(#grad-hid)" class="node n" style="animation-delay: 0.7s"/>
  <circle cx="250" cy="240" r="6" fill="url(#grad-hid)" class="node n" style="animation-delay: 1.2s"/>

  <circle cx="400" cy="110" r="6" fill="#f78166" class="node n" style="animation-delay: 0.4s"/>
  <circle cx="400" cy="190" r="6" fill="#f78166" class="node n" style="animation-delay: 0.9s"/>
</svg>
